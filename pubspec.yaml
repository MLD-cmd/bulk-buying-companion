name: bulk_buying_companion
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^6.0.1
  geolocator: ^14.0.3
  image_picker: ^1.2.3
  google_mlkit_barcode_scanning: ^0.15.0
  google_mlkit_text_recognition: ^0.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/branding/app_icon.png
    - assets/branding/splash_logo.png

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-VariableFont_wght.ttf
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-VariableFont_wght.ttf

